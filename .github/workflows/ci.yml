name: Pipeline de CI

on: [push]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Flask
        run: pip install flask
      - name: Run Tests
        run: python -m unittest -v tests/appTest.py